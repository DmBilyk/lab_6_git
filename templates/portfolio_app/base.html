<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker</title>
    <!-- Task 3.2.1: Chart.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a1a2e; padding: 16px 24px; color: white; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        nav a { color: #e0e0e0; text-decoration: none; font-size: 14px; }
        nav a:hover { color: white; }
        nav .brand { font-weight: bold; font-size: 18px; margin-right: auto; }
        .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1, h2, h3 { margin-bottom: 16px; }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        th, td {
            text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px;
            max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        th { background: #f8f8f8; font-weight: 600; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
        .btn-primary { background: #4361ee; color: white; }
        .btn-primary:hover { background: #3451d1; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        form label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: 500; }
        form input, form select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 14px; font-size: 14px; }
        .errorlist { color: #e53935; font-size: 12px; margin: -10px 0 10px; list-style: none; }
        .total-row td { font-weight: bold; border-top: 2px solid #4361ee; color: #4361ee; border-bottom: none; }
        .empty-note { color: #888; font-size: 14px; }
        .tag { display: inline-block; background: #eef0ff; color: #4361ee; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 600; }
        .portfolio-grid { display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }
        .chart-container { position: relative; width: 100%; max-width: 260px; margin: 0 auto; }
        .weight-badge { font-size: 12px; color: #666; }
        @media (max-width: 640px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav>
    <span class="brand">📈 Portfolio Tracker</span>
    <a href="{% url 'dashboard' %}">Дашборд</a>
    <a href="{% url 'create_portfolio' %}">+ Портфель</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
